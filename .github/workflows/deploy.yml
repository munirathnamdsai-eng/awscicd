name: Deploy Digital Twin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: windows-latest        # ← Changed from ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
          echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Deployment Script
        run: |
          .\scripts\deploy.ps1 -Environment $env:DEPLOY_ENV
        shell: pwsh
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}

      - name: Get Deployment URLs
        id: deploy_outputs
        working-directory: ./terraform
        run: |
          $awsAccountId = aws sts get-caller-identity --query Account --output text
          $awsRegion = if ($env:TF_STATE_REGION) { $env:TF_STATE_REGION } else { "us-east-1" }
          terraform init -input=false `
            -backend-config="bucket=$env:TF_STATE_BUCKET" `
            -backend-config="key=$env:DEPLOY_ENV/terraform.tfstate" `
            -backend-config="region=$awsRegion" `
            -backend-config="encrypt=true" `
            -reconfigure
          terraform workspace select $env:DEPLOY_ENV
          if ($LASTEXITCODE -ne 0) { terraform workspace new $env:DEPLOY_ENV }
          $cloudfrontUrl = terraform output -raw cloudfront_url
          $cloudfrontId  = terraform output -raw cloudfront_distribution_id
          $apiUrl        = terraform output -raw api_gateway_url
          $frontendBucket = terraform output -raw s3_frontend_bucket
          echo "cloudfront_url=$cloudfrontUrl"   >> $env:GITHUB_OUTPUT
          echo "cloudfront_id=$cloudfrontId"     >> $env:GITHUB_OUTPUT
          echo "api_url=$apiUrl"                 >> $env:GITHUB_OUTPUT
          echo "frontend_bucket=$frontendBucket" >> $env:GITHUB_OUTPUT
        shell: pwsh
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation `
            --distribution-id ${{ steps.deploy_outputs.outputs.cloudfront_id }} `
            --paths "/*"
        shell: pwsh

      - name: Deployment Summary
        run: |
          Write-Host "✅ Deployment Complete!"
          Write-Host "🌐 CloudFront URL : ${{ steps.deploy_outputs.outputs.cloudfront_url }}"
          Write-Host "📡 API Gateway    : ${{ steps.deploy_outputs.outputs.api_url }}"
          Write-Host "🪣 Frontend Bucket: ${{ steps.deploy_outputs.outputs.frontend_bucket }}"
        shell: pwsh